# .github/workflows/extract_all.yml
# ---------------------------------------------------------------------------
# Pipeline de extracción de datos UMOH — corre cada 6 horas
#
# Orquesta la extraccion de datos de todas las plataformas activas,
# la normalizacion al schema canonico y la escritura en Google Sheets.
#
# Plataformas activas por fase:
#   Fase 2 (actual): Google Ads
#   Fase 3 (pendiente): Meta Ads
#   Fase 4 (pendiente): LinkedIn Ads
#
# Secrets requeridos en el repositorio:
#   GOOGLE_ADS_DEVELOPER_TOKEN
#   GOOGLE_ADS_CLIENT_ID
#   GOOGLE_ADS_CLIENT_SECRET
#   GOOGLE_ADS_REFRESH_TOKEN
#   GOOGLE_ADS_LOGIN_CUSTOMER_ID
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   GOOGLE_SHEETS_SA_JSON  (Service Account JSON — para espejo facts → Sheets)
# ---------------------------------------------------------------------------

name: Extract & Load — All Platforms

on:
  schedule:
    # Cada 6 horas. Google Ads tiene lag de ~3h; Meta puede tardar hasta 24h.
    # Mas frecuente que esto no agrega valor y consume minutos de Actions.
    - cron: "0 */6 * * *"

  # Permite correr el pipeline manualmente desde la UI de GitHub Actions.
  # Util para pruebas, recuperacion de errores y onboarding de clientes nuevos.
  workflow_dispatch:
    inputs:
      days_back:
        description: "Cuantos dias hacia atras extraer (default: 7)"
        required: false
        default: "7"
      client_filter:
        description: "Filtrar por client_id especifico (vacio = todos los activos)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Google Ads → Normalizar → Escribir en Sheets
  # ---------------------------------------------------------------------------
  google-ads:
    name: Google Ads — Extraer y cargar TOFU
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Service Account de UMOH para escribir en las Sheets de los clientes
      # (espejo facts — sprint 1.7 Fase 3). Si está vacío, el mirror se saltea.
      GOOGLE_SHEETS_SA_JSON: ${{ secrets.GOOGLE_SHEETS_SA_JSON }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline TOFU (Google Ads → Supabase + facts mirror Sheets)
        # NOTA: --no-sheets desactiva la escritura legacy en la pestaña tofu_raw
        # (DataFrame normalizado). El espejo de tofu_facts a la pestaña 'tofu_facts'
        # se ejecuta dentro del pipeline (Paso 6) cuando GOOGLE_SHEETS_SA_JSON está
        # presente y siempre que --no-sheets no esté activo a nivel de toda la
        # escritura a Sheets. Para una corrida sin ningún mirror, omitir el secret.
        run: |
          python scripts/run_tofu_pipeline.py \
            --days "${{ github.event.inputs.days_back || '7' }}" \
            --no-sheets

      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[UMOH] ERROR en pipeline Google Ads — ${{ github.run_id }}"
          to: hola@umohcrew.com
          from: "UMOH Pipeline <hola@umohcrew.com>"
          body: |
            El pipeline de extraccion de Google Ads fallo.

            Repositorio: ${{ github.repository }}
            Run ID: ${{ github.run_id }}
            Commit: ${{ github.sha }}

            Ver logs en: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
