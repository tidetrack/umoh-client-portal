name: Deploy → prepagas.umohcrew.com

on:
  push:
    paths:
      - 'product/dashboard/**'
      - 'product/api/**'
      - '.github/workflows/deploy.yml'
      - '.github/scripts/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SSH_PORT: 65002

jobs:
  # ── STAGING — cualquier rama que no sea main ───────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref != 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de staging
        env:
          ADMIN_HASH: ${{ secrets.UMOH_ADMIN_HASH }}
          PREPAGAS_HASH: ${{ secrets.UMOH_PREPAGAS_HASH }}
        run: |
          mkdir -p build/staging/api/config
          cp -r product/dashboard/. build/staging/
          cp -r product/api/.       build/staging/api/
          # Sed deja como está si api.js usa USE_MOCK por-endpoint (objeto). Histórico: forzaba mock global.
          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' build/staging/assets/js/api.js || true
          python3 .github/scripts/inject_credentials.py build/staging
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/staging/api/config/sa.json
          # .env con credenciales Supabase para tofu.php (lo lee env.php). Solo lo mínimo: nada de OAuth/Sheets.
          cat > build/staging/.env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Deploy via rsync
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/staging/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:domains/umohcrew.com/public_html/prepagas/staging/"

      - name: Invalidar OPcache staging
        run: |
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'find domains/umohcrew.com/public_html/prepagas/staging/ -name "*.php" -exec touch {} \; 2>/dev/null; echo "OK"'

  # ── PRODUCCIÓN — solo main ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de producción
        env:
          ADMIN_HASH: ${{ secrets.UMOH_ADMIN_HASH }}
          PREPAGAS_HASH: ${{ secrets.UMOH_PREPAGAS_HASH }}
        run: |
          mkdir -p build/prepagas/api/config
          cp -r product/dashboard/. build/prepagas/
          cp -r product/api/.       build/prepagas/api/
          # USE_MOCK ahora es per-endpoint (objeto). El estado por-endpoint está en api.js
          # del repo — no se sobreescribe en el deploy. Si querés forzar todo a mock en prod
          # mientras se valida, hacelo en el commit a main, no acá.
          grep -q "const USE_MOCK" build/prepagas/assets/js/api.js || { echo "ERROR: const USE_MOCK no encontrado en api.js"; exit 1; }
          python3 .github/scripts/inject_credentials.py build/prepagas
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/prepagas/api/config/sa.json
          # .env con credenciales Supabase para los endpoints PHP que leen de Supabase.
          cat > build/prepagas/.env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF
          # Canario de deploy — Franco accede a prepagas.umohcrew.com/deploy-canary.txt para confirmar path servido
          echo "Deploy SHA: ${GITHUB_SHA:0:7} — $(date -u +%Y-%m-%dT%H:%M:%SZ)" > build/prepagas/deploy-canary.txt

      - name: Deploy via rsync
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/prepagas/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:domains/umohcrew.com/public_html/prepagas/"

      - name: Verificación post-deploy (canario + timestamp del index)
        run: |
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'echo "════ Canary en path del subdomain ════"; cat domains/umohcrew.com/public_html/prepagas/deploy-canary.txt 2>/dev/null || echo "NO EXISTE — path incorrecto"; \
             echo ""; \
             echo "════ Timestamp del index.php ════"; stat domains/umohcrew.com/public_html/prepagas/index.php 2>/dev/null | grep Modify || echo "no existe"'

      - name: Limpiar servidor + invalidar OPcache
        run: |
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'rm -f domains/umohcrew.com/public_html/prepagas/index.html; find domains/umohcrew.com/public_html/prepagas/ -maxdepth 6 -name "*.php" -exec touch {} \; 2>/dev/null; echo "OK"'
