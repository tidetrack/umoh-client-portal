name: Deploy → prepagas.umohcrew.com

on:
  push:
    paths:
      - 'product/dashboard/**'
      - 'product/api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Hostinger shared hosting usa puerto 65002 para SSH/SFTP (no el 22 estándar)
  SSH_PORT: 65002

jobs:
  # ── DIAGNÓSTICO — verifica conectividad SFTP ───────────────────────────────
  sftp-check:
    name: Verificar conectividad SFTP
    runs-on: ubuntu-latest
    steps:
      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Test conexión SFTP
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "→ Probando SFTP a ${{ secrets.FTP_HOST }} puerto $SSH_PORT..."
          sshpass -p "$FTP_PASS" sftp \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -P $SSH_PORT \
            "${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}" \
            <<< "ls" \
            2>&1 || echo "EXIT CODE: $?"

  # ── STAGING — cualquier rama que no sea main ───────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: sftp-check
    if: github.ref != 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Preparar build de staging
        run: |
          mkdir -p build/staging
          cp -r product/dashboard/. build/staging/
          cp -r product/api/.       build/staging/api/
          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' \
            build/staging/assets/js/api.js || true
          rm -f build/staging/config/credentials.php
          rm -f build/staging/api/config/sa.json

      - name: Deploy via SFTP → /public_html/prepagas/staging/
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -p "$FTP_PASS" rsync -avz --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            build/staging/ \
            "${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:/public_html/prepagas/staging/"

  # ── PRODUCCIÓN — solo main ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: sftp-check
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Preparar build de producción
        run: |
          mkdir -p build/prepagas
          cp -r product/dashboard/. build/prepagas/
          cp -r product/api/.       build/prepagas/api/
          sed -i 's/const USE_MOCK = true.*/const USE_MOCK = false;/' \
            build/prepagas/assets/js/api.js
          rm -f build/prepagas/config/credentials.php
          rm -f build/prepagas/api/config/sa.json

      - name: Deploy via SFTP → /public_html/prepagas/
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -p "$FTP_PASS" rsync -avz --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            build/prepagas/ \
            "${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:/public_html/prepagas/"
