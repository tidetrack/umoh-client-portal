name: Deploy → prepagas.umohcrew.com

on:
  push:
    paths:
      - 'product/dashboard/**'
      - 'product/api/**'
      - '.github/workflows/deploy.yml'
      - '.github/scripts/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SSH_PORT: 65002

jobs:
  # ── STAGING — cualquier rama que no sea main ───────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref != 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de staging
        env:
          ADMIN_HASH: ${{ secrets.UMOH_ADMIN_HASH }}
          PREPAGAS_HASH: ${{ secrets.UMOH_PREPAGAS_HASH }}
        run: |
          mkdir -p build/staging/api/config
          cp -r product/dashboard/. build/staging/
          cp -r product/api/.       build/staging/api/
          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' build/staging/assets/js/api.js || true
          python3 .github/scripts/inject_credentials.py build/staging
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/staging/api/config/sa.json

      - name: Deploy via rsync
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/staging/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:public_html/prepagas/staging/"

      - name: Invalidar OPcache staging
        run: |
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'find public_html/prepagas/staging/ -name "*.php" -exec touch {} \; 2>/dev/null; echo "OK"'

  # ── PRODUCCIÓN — solo main ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de producción
        env:
          ADMIN_HASH: ${{ secrets.UMOH_ADMIN_HASH }}
          PREPAGAS_HASH: ${{ secrets.UMOH_PREPAGAS_HASH }}
        run: |
          mkdir -p build/prepagas/api/config
          cp -r product/dashboard/. build/prepagas/
          cp -r product/api/.       build/prepagas/api/
          # TEMP (Fase 1): producción usa mock data hasta que los endpoints reales estén listos (Fase 2+).
          # Cuando Google Ads/Meta/MeisterTask estén conectados, volver este sed a: USE_MOCK = false
          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' build/prepagas/assets/js/api.js || true
          grep -q "USE_MOCK = true" build/prepagas/assets/js/api.js || { echo "ERROR: USE_MOCK no quedó en true"; exit 1; }
          python3 .github/scripts/inject_credentials.py build/prepagas
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/prepagas/api/config/sa.json
          # Canario de deploy — Franco accede a prepagas.umohcrew.com/deploy-canary.txt para confirmar path servido
          echo "Deploy SHA: ${GITHUB_SHA:0:7} — $(date -u +%Y-%m-%dT%H:%M:%SZ)" > build/prepagas/deploy-canary.txt

      - name: Deploy via rsync
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/prepagas/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:public_html/prepagas/"

      - name: Diagnóstico post-deploy (dónde vive el index.php real del subdomain)
        run: |
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'echo "════ PWD / ~ del usuario SSH ════"; pwd; echo "HOME=$HOME"; ls -la ~/ 2>/dev/null | head -20; \
             echo ""; \
             echo "════ Todos los index.php del home (hasta depth 6) ════"; find ~ -maxdepth 6 -iname "index.php" 2>/dev/null; \
             echo ""; \
             echo "════ Todos los deploy-canary.txt del home ════"; find ~ -maxdepth 6 -iname "deploy-canary.txt" 2>/dev/null; \
             echo ""; \
             echo "════ Buscar cualquier directorio con prepagas en el nombre ════"; find ~ -maxdepth 5 -type d -iname "*prepagas*" 2>/dev/null; \
             echo ""; \
             echo "════ Contenido de public_html/ del home (top level) ════"; ls -la public_html/ 2>/dev/null | head -30; \
             echo ""; \
             echo "════ .htaccess del home (puede tener RewriteRule del subdomain) ════"; cat ~/.htaccess 2>/dev/null | head -40 || echo "no hay"; \
             echo ""; \
             echo "════ .htaccess de public_html/ ════"; cat public_html/.htaccess 2>/dev/null | head -40 || echo "no hay"; \
             echo ""; \
             echo "════ Canary DESPUÉS del rsync en public_html/prepagas/ ════"; cat public_html/prepagas/deploy-canary.txt 2>/dev/null || echo "no existe"'

      - name: Limpiar servidor + invalidar OPcache
        run: |
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'rm -f public_html/prepagas/index.html; find public_html/prepagas/ -maxdepth 6 -name "*.php" -exec touch {} \; 2>/dev/null; echo "OK"'
