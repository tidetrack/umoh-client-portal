name: Deploy → prepagas.umohcrew.com

on:
  push:
    paths:
      - 'product/dashboard/**'
      - 'product/api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── DIAGNÓSTICO — corre siempre primero ────────────────────────────────────
  ftp-check:
    name: Verificar conectividad FTP
    runs-on: ubuntu-latest
    steps:
      - name: Test FTP login con curl
        run: |
          echo "→ Probando conexión FTP a ${{ secrets.FTP_HOST }}..."
          curl -v \
            --user "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_HOST }}/" \
            --connect-timeout 15 \
            --max-time 20 \
            2>&1 | grep -E "(Connected|220|230|530|331|Login|USER|PASS|error|curl)" || true
          echo "→ Exit code: $?"

  # ── STAGING — cualquier rama que no sea main ───────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ftp-check
    if: github.ref != 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar build de staging
        run: |
          mkdir -p build/staging

          cp -r product/dashboard/. build/staging/
          cp -r product/api/.       build/staging/api/

          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' \
            build/staging/assets/js/api.js || true

          echo "✓ USE_MOCK en staging:"
          grep "const USE_MOCK" build/staging/assets/js/api.js || echo "(no encontrado)"

          rm -f build/staging/config/credentials.php
          rm -f build/staging/api/config/sa.json

      - name: Deploy via FTP → /prepagas/staging/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USER }}
          password:    ${{ secrets.FTP_PASSWORD }}
          protocol:    ftp
          port:        21
          local-dir:   ./build/staging/
          server-dir:  /prepagas/staging/
          log-level:   verbose
          exclude: |
            **/.DS_Store
            **/Thumbs.db
            **/.gitkeep

  # ── PRODUCCIÓN — solo main ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ftp-check
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar build de producción
        run: |
          mkdir -p build/prepagas

          cp -r product/dashboard/. build/prepagas/
          cp -r product/api/.       build/prepagas/api/

          sed -i 's/const USE_MOCK = true.*/const USE_MOCK = false;/' \
            build/prepagas/assets/js/api.js

          echo "✓ USE_MOCK en build:"
          grep "const USE_MOCK" build/prepagas/assets/js/api.js

          rm -f build/prepagas/config/credentials.php
          rm -f build/prepagas/api/config/sa.json

      - name: Deploy via FTP → /prepagas/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USER }}
          password:    ${{ secrets.FTP_PASSWORD }}
          protocol:    ftp
          port:        21
          local-dir:   ./build/prepagas/
          server-dir:  /prepagas/
          log-level:   verbose
          exclude: |
            **/.DS_Store
            **/Thumbs.db
            **/.gitkeep
