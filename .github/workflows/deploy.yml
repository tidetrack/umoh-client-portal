name: Deploy → prepagas.umohcrew.com

on:
  push:
    paths:
      - 'product/dashboard/**'
      - 'product/api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SSH_PORT: 65002

jobs:
  # ── STAGING — cualquier rama que no sea main ───────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref != 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de staging
        run: |
          mkdir -p build/staging/api/config
          cp -r product/dashboard/. build/staging/
          cp -r product/api/.       build/staging/api/
          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' \
            build/staging/assets/js/api.js || true
          rm -f build/staging/config/credentials.php
          # Escribir SA key desde GitHub Secret (nunca desde disco)
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/staging/api/config/sa.json

      - name: Deploy via rsync → /public_html/prepagas/staging/
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/staging/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:public_html/prepagas/staging/"

  # ── PRODUCCIÓN — solo main ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de producción
        run: |
          mkdir -p build/prepagas/api/config
          cp -r product/dashboard/. build/prepagas/
          cp -r product/api/.       build/prepagas/api/
          # Flags de seguridad: nunca llegan activos a producción
          sed -i 's/const USE_MOCK = true.*/const USE_MOCK = false;/' \
            build/prepagas/assets/js/api.js
          sed -i "s/define('PHASE1_BYPASS', true)/define('PHASE1_BYPASS', false)/g" \
            build/prepagas/auth_check.php build/prepagas/index.php 2>/dev/null || true
          rm -f build/prepagas/config/credentials.php
          # Escribir SA key desde GitHub Secret (nunca desde disco)
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/prepagas/api/config/sa.json

      - name: Deploy via rsync → /public_html/prepagas/
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/prepagas/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:public_html/prepagas/"
