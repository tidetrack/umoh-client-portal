name: Deploy → prepagas.umohcrew.com

on:
  push:
    paths:
      - 'product/dashboard/**'
      - 'product/api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── DIAGNÓSTICO — muestra qué credenciales llegan al runner ───────────────
  ftp-check:
    name: Verificar conectividad FTP
    runs-on: ubuntu-latest
    steps:
      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Mostrar config (sin exponer contraseña)
        run: |
          echo "HOST:  ${{ secrets.FTP_HOST }}"
          echo "USER:  ${{ secrets.FTP_USER }}"
          echo "PASS length: ${#FTP_PASS}"
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}

      - name: Test login FTP con lftp
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "${{ secrets.FTP_USER }}","$FTP_PASS" \
               -e "set ssl:verify-certificate no; ls; quit" \
               ftp://${{ secrets.FTP_HOST }} \
               2>&1 || echo "EXIT CODE: $?"

  # ── STAGING — cualquier rama que no sea main ───────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ftp-check
    if: github.ref != 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Preparar build de staging
        run: |
          mkdir -p build/staging
          cp -r product/dashboard/. build/staging/
          cp -r product/api/.       build/staging/api/
          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' \
            build/staging/assets/js/api.js || true
          rm -f build/staging/config/credentials.php
          rm -f build/staging/api/config/sa.json

      - name: Deploy via lftp → /prepagas/staging/
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "${{ secrets.FTP_USER }}","$FTP_PASS" \
               ftp://${{ secrets.FTP_HOST }} <<'LFTP'
            set ssl:verify-certificate no
            set ftp:passive-mode true
            set net:timeout 30
            mirror --reverse --delete --verbose \
              build/staging/ /prepagas/staging/
            quit
          LFTP

  # ── PRODUCCIÓN — solo main ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ftp-check
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Preparar build de producción
        run: |
          mkdir -p build/prepagas
          cp -r product/dashboard/. build/prepagas/
          cp -r product/api/.       build/prepagas/api/
          sed -i 's/const USE_MOCK = true.*/const USE_MOCK = false;/' \
            build/prepagas/assets/js/api.js
          rm -f build/prepagas/config/credentials.php
          rm -f build/prepagas/api/config/sa.json

      - name: Deploy via lftp → /prepagas/
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "${{ secrets.FTP_USER }}","$FTP_PASS" \
               ftp://${{ secrets.FTP_HOST }} <<'LFTP'
            set ssl:verify-certificate no
            set ftp:passive-mode true
            set net:timeout 30
            mirror --reverse --delete --verbose \
              build/prepagas/ /prepagas/
            quit
          LFTP
