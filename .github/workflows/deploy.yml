name: Deploy → prepagas.umohcrew.com

on:
  push:
    paths:
      - 'product/dashboard/**'
      - 'product/api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SSH_PORT: 65002

jobs:
  # ── STAGING — cualquier rama que no sea main ───────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref != 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de staging
        env:
          ADMIN_HASH: ${{ secrets.UMOH_ADMIN_HASH }}
          PREPAGAS_HASH: ${{ secrets.UMOH_PREPAGAS_HASH }}
        run: |
          mkdir -p build/staging/api/config
          cp -r product/dashboard/. build/staging/
          cp -r product/api/.       build/staging/api/
          sed -i 's/const USE_MOCK = false.*/const USE_MOCK = true;/' \
            build/staging/assets/js/api.js || true
          python3 -c "
import os, sys
tmpl = open('build/staging/config/credentials.template.php').read()
out  = tmpl.replace('ADMIN_HASH_PLACEHOLDER',    os.environ['ADMIN_HASH'])
out  = out.replace('PREPAGAS_HASH_PLACEHOLDER',  os.environ['PREPAGAS_HASH'])
if 'PLACEHOLDER' in out: sys.exit('ERROR: hashes no inyectados — verificar secrets')
open('build/staging/config/credentials.php', 'w').write(out)
"
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/staging/api/config/sa.json

      - name: Deploy via rsync → /public_html/prepagas/staging/
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/staging/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:public_html/prepagas/staging/"
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'find public_html/prepagas/staging/ -name "*.php" -exec touch {} \; 2>/dev/null && echo "OPcache invalidado"'

  # ── PRODUCCIÓN — solo main ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Producción
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preparar build de producción
        env:
          ADMIN_HASH: ${{ secrets.UMOH_ADMIN_HASH }}
          PREPAGAS_HASH: ${{ secrets.UMOH_PREPAGAS_HASH }}
        run: |
          mkdir -p build/prepagas/api/config
          cp -r product/dashboard/. build/prepagas/
          cp -r product/api/.       build/prepagas/api/
          sed -i 's/const USE_MOCK = true.*/const USE_MOCK = false;/' \
            build/prepagas/assets/js/api.js
          grep -q "USE_MOCK = false" build/prepagas/assets/js/api.js \
            || { echo "ERROR: USE_MOCK no quedó en false"; exit 1; }
          python3 -c "
import os, sys
tmpl = open('build/prepagas/config/credentials.template.php').read()
out  = tmpl.replace('ADMIN_HASH_PLACEHOLDER',   os.environ['ADMIN_HASH'].strip())
out  = out.replace('PREPAGAS_HASH_PLACEHOLDER', os.environ['PREPAGAS_HASH'].strip())
if 'PLACEHOLDER' in out: sys.exit('ERROR: hashes no inyectados — verificar secrets')
open('build/prepagas/config/credentials.php', 'w').write(out)
"
          echo '${{ secrets.GOOGLE_SHEETS_SA_JSON }}' > build/prepagas/api/config/sa.json

      - name: Deploy via rsync → /public_html/prepagas/
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build/prepagas/ \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}:public_html/prepagas/"
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.FTP_HOST }}" \
            'rm -f public_html/prepagas/index.html && find public_html/prepagas/ -maxdepth 3 -name "*.php" -exec touch {} \; 2>/dev/null && echo "index.html eliminado + OPcache invalidado"'
