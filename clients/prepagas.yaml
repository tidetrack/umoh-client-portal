# Config cliente: Prevención Salud Mendoza (prepagas)
# Reemplazar los valores entre comillas con los IDs reales antes de usar.

client_id: prepagas
client_name: "Prevencion Salud Mendoza"
dashboard_slug: prepagas
active: true

platforms:
  google_ads:
    enabled: true
    customer_id: "384-763-4137"
  meta:
    enabled: false   # Activar en Fase 2
    ad_account_id: "REEMPLAZAR_CON_AD_ACCOUNT_ID"  # Ej: "act_123456789"
  linkedin:
    enabled: false

sheets:
  bofu_input_id: "12iVYwOtU969NVZ1v6kP32GBbv-AUOkqV25KhN1tDAew"
  output_id: "12iVYwOtU969NVZ1v6kP32GBbv-AUOkqV25KhN1tDAew"

reporting:
  timezone: "America/Argentina/Mendoza"
  currency: "ARS"
  # campaign_id y campaign_name: identifican la campaña activa.
  # En v1 hay una sola campaña PMAX. Cuando Google Ads traiga el ID real
  # (número de campaña de la API), reemplazar 'PMAX_PREPAGAS' con ese valor.
  # El extractor ya trae campaign.id real — este campo es el fallback que usa
  # run_meistertask_pipeline.py para asociar los leads de MeisterTask a la campaña.
  campaign_id: "PMAX_PREPAGAS"
  campaign_name: "PMAX Prevención Salud"
  segments:
    - Voluntario
    - Monotributista
    - Obligatorio
  lead_statuses:
    - Contactado
    - No Prospera
    - A Futuro
    - En Emision
    - Erroneo
    - En Blanco

